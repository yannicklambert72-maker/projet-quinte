name: Capture Cotes

on:
  schedule:
    - cron: '0,30 6-20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cotes:
    name: Capture Cotes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Capturer les cotes
        run: python capter_cotes_auto.py
      - name: Sauvegarder les cotes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p historique_cotes
          git add historique_cotes/ || true
          git diff --staged --quiet || git commit -m "Cotes $(date +'%Y-%m-%d %H:%M UTC')"
          git push || true