name: Pronostics Presse

on:
  schedule:
    - cron: '0 1 * * *'    # 9h UTC
    - cron: '0 2 * * *'   # 10h UTC
    - cron: '0 3 * * *'   # 11h UTC
    - cron: '0 4 * * *'   # 12h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pronostics_presse:
    name: Pronostics Presse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier si déjà récupéré aujourd'hui
        id: check
        run: |
          DATE=$(date +'%Y-%m-%d')
          if [ -f "historique/pronostics_presse_${DATE}.csv" ]; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "Pronostics déjà récupérés aujourd'hui, on passe."
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "Pas encore récupérés, on lance le scraper."
          fi

      - name: Lancer le scraper presse
        if: steps.check.outputs.already_done == 'false'
        run: python prono_presse.py

      - name: Sauvegarder le CSV
        if: steps.check.outputs.already_done == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique/*.csv || true
          git diff --staged --quiet || git commit -m "Pronostics presse $(date +'%Y-%m-%d')"
          git push || true
