name: Pronostics Presse

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pronostics_presse:
    name: Pronostics Presse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer le scraper presse
        run: python prono_presse.py
      - name: Sauvegarder le CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique/*.csv
          git diff --staged --quiet || git commit -m "Pronostics presse $(date +'%Y-%m-%d')"
          git push