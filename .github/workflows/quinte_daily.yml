name: Quinté - Cotes et Pronostics

on:
  schedule:
    - cron: '30 11 * * *'
    - cron: '0,30 11-20 * * 6,0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pronostics_presse:
    name: Pronostics Presse (quotidien 13h30)
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer le scraper presse
        run: python prono_presse.py
      - name: Sauvegarder le CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique/*.csv
          git diff --staged --quiet || git commit -m "Pronostics presse $(date +'%Y-%m-%d')"
          git push

  cotes_weekend:
    name: Capture Cotes (week-end)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 11-20 * * 6,0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Trouver le Quinté du jour
        run: python trouver_quinte.py
      - name: Capturer les cotes
        run: python capter_cotes.py
      - name: Sauvegarder les cotes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique_cotes/*.csv
          git diff --staged --quiet || git commit -m "Cotes $(date +'%Y-%m-%d %H:%M')"
          git push
