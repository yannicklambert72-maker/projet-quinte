name: Quinte du jour

on:
  schedule:
    - cron: '30 11 * * *'   # 13h30 heure de Paris (été = UTC+2)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le scraper
        run: python prono_presse.py

      - name: Enregistrer le CSV dans le dépôt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique/*.csv
          git diff --staged --quiet || git commit -m "Ajout pronostics du $(date +'%Y-%m-%d')"
          git push
