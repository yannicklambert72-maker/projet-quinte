name: Quinté - Cotes et Pronostics

on:
  schedule:
    # Pronostics presse : tous les jours à 7h UTC (9h Paris)
    - cron: '0 7 * * *'
    # Captures cotes : tous les jours toutes les 30 min de 6h à 20h UTC (8h-22h Paris)
    - cron: '0,30 6-20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pronostics_presse:
    name: Pronostics Presse
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer le scraper presse
        run: python prono_presse.py
      - name: Sauvegarder le CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique/*.csv
          git diff --staged --quiet || git commit -m "Pronostics presse $(date +'%Y-%m-%d')"
          git push

  cotes:
    name: Capture Cotes
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 6-20 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Capturer les cotes si dans la fenêtre H-5h/H
        run: python capter_cotes_auto.py
      - name: Sauvegarder les cotes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add historique_cotes/*.csv
          git diff --staged --quiet || git commit -m "Cotes $(date +'%Y-%m-%d %H:%M UTC')"
          git push
